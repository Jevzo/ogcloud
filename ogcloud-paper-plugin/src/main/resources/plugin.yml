name: OgCloud
version: "${version}"
main: io.ogwars.cloud.paper.OgCloudPaperPlugin
description: OgCloud Paper Plugin - Server lifecycle and heartbeat reporting
api-version: "1.21"
depend: [ProtocolLib]
commands:
  pogcloud:
    description: OgCloud backend command surface
    aliases: [poc]
    permission: ogcloud.admin.npc
permissions:
  ogcloud.admin.npc:
    description: Allows managing OgCloud NPCs from the backend server
    default: op
