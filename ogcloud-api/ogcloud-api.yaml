components:
  schemas:
    ErrorResponse:
      type: object
      properties:
        status:
          type: integer
          format: int32
        message:
          type: string
        details:
          type: array
          items:
            type: string
      required:
      - details
      - message
      - status
    UpdateWebUserRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          pattern: .*\S.*
        username:
          type: string
          pattern: .*\S.*
        role:
          type: string
    WebUserResponse:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        username:
          type: string
        role:
          type: string
          enum:
          - SERVICE
          - ADMIN
          - DEVELOPER
        linkedPlayerUuid:
          type: string
      required:
      - email
      - id
      - role
      - username
    SetPlayerGroupRequest:
      type: object
      properties:
        group:
          type: string
          minLength: 1
        duration:
          type: string
          minLength: 1
      required:
      - duration
      - group
    PermissionConfigResponse:
      type: object
      properties:
        group:
          type: string
        length:
          type: integer
          format: int64
        endMillis:
          type: integer
          format: int64
      required:
      - endMillis
      - group
      - length
    PlayerResponse:
      type: object
      properties:
        uuid:
          type: string
        name:
          type: string
        permission:
          $ref: "#/components/schemas/PermissionConfigResponse"
        firstJoin:
          type: string
        online:
          type: boolean
        proxyId:
          type: string
        proxyDisplayName:
          type: string
        serverId:
          type: string
        serverDisplayName:
          type: string
        connectedAt:
          type: string
      required:
      - firstJoin
      - name
      - online
      - permission
      - uuid
    DisplayConfigRequest:
      type: object
      properties:
        chatPrefix:
          type: string
        chatSuffix:
          type: string
        nameColor:
          type: string
        tabPrefix:
          type: string
      required:
      - chatPrefix
      - chatSuffix
      - nameColor
      - tabPrefix
    PermissionGroupPermissionRequest:
      type: object
      properties:
        perm:
          type: string
          minLength: 1
        description:
          type: string
      required:
      - description
      - perm
    UpdatePermissionGroupRequest:
      type: object
      properties:
        name:
          type: string
        display:
          $ref: "#/components/schemas/DisplayConfigRequest"
        weight:
          type: integer
          format: int32
        default:
          type: boolean
        permissions:
          type: array
          items:
            $ref: "#/components/schemas/PermissionGroupPermissionRequest"
    DisplayConfigResponse:
      type: object
      properties:
        chatPrefix:
          type: string
        chatSuffix:
          type: string
        nameColor:
          type: string
        tabPrefix:
          type: string
      required:
      - chatPrefix
      - chatSuffix
      - nameColor
      - tabPrefix
    PermissionGroupPermissionResponse:
      type: object
      properties:
        perm:
          type: string
        description:
          type: string
      required:
      - description
      - perm
    PermissionGroupResponse:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        display:
          $ref: "#/components/schemas/DisplayConfigResponse"
        weight:
          type: integer
          format: int32
        default:
          type: boolean
        permissions:
          type: array
          items:
            $ref: "#/components/schemas/PermissionGroupPermissionResponse"
      required:
      - default
      - display
      - id
      - name
      - permissions
      - weight
    NpcActionRequest:
      type: object
      properties:
        type:
          type: string
          enum:
          - NONE
          - TRANSFER
        transfer:
          $ref: "#/components/schemas/NpcTransferActionRequest"
      required:
      - type
    NpcLocationRequest:
      type: object
      properties:
        world:
          type: string
          minLength: 1
        x:
          type: number
          format: double
        "y":
          type: number
          format: double
        z:
          type: number
          format: double
        yaw:
          type: number
          format: float
        pitch:
          type: number
          format: float
      required:
      - pitch
      - world
      - x
      - "y"
      - yaw
      - z
    NpcSkinRequest:
      type: object
      properties:
        textureValue:
          type: string
          minLength: 1
          example: 
        textureSignature:
          type: string
          example: 
      required:
      - textureValue
    NpcTransferActionRequest:
      type: object
      properties:
        group:
          type: string
          minLength: 1
        routingStrategy:
          type: string
          enum:
          - MOST_FILLED
          - LEAST_FILLED
          - BALANCED
      required:
      - group
    UpdateNpcLookAtRequest:
      type: object
      properties:
        enabled:
          type: boolean
        radius:
          type: number
          format: double
    UpdateNpcRequest:
      type: object
      properties:
        location:
          $ref: "#/components/schemas/NpcLocationRequest"
        title:
          type: string
        subtitle:
          type: string
        model:
          type: string
          enum:
          - STEVE
          - ALEX
          default: ALEX
        skin:
          $ref: "#/components/schemas/NpcSkinRequest"
        clearSkin:
          type: boolean
