namespace:
  name: ogcloud

global:
  imagePullPolicy: IfNotPresent

mongodb:
  enabled: true
  image:
    repository: mongo
    tag: 8.2.5
  service:
    port: 27017
  persistence:
    enabled: true
    storageClassName: ""
    accessMode: ReadWriteOnce
    size: 1Gi
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m

redis:
  enabled: true
  image:
    repository: redis
    tag: 8.4.2-alpine
  service:
    port: 6379
  persistence:
    enabled: true
    storageClassName: ""
    accessMode: ReadWriteOnce
    size: 512Mi
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 250m

minio:
  enabled: true
  image:
    repository: minio/minio
    tag: RELEASE.2025-09-07T16-13-09Z
  bootstrapImage:
    repository: minio/mc
    tag: RELEASE.2025-08-13T08-35-41Z
  rootCredentials:
    accessKey: minioadmin
    secretKey: minioadmin123
  bootstrapBuckets:
    - ogcloud-templates
  service:
    apiPort: 9000
    consolePort: 9001
  persistence:
    enabled: true
    storageClassName: ""
    accessMode: ReadWriteOnce
    size: 2Gi
  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m

kafka:
  enabled: true
  image:
    repository: apache/kafka
    tag: 4.2.0
  service:
    internalPort: 9092
    controllerPort: 9093
    externalPort: 9094
  env:
    nodeId: "1"
    processRoles: broker,controller
    listeners: INTERNAL://:9092,EXTERNAL://:9094,CONTROLLER://:9093
    advertisedListeners: ""
    controllerListenerNames: CONTROLLER
    listenerSecurityProtocolMap: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
    interBrokerListenerName: INTERNAL
    controllerQuorumVoters: ""
    offsetsTopicReplicationFactor: "1"
    transactionStateLogReplicationFactor: "1"
    transactionStateLogMinIsr: "1"
    groupInitialRebalanceDelayMs: "0"
  persistence:
    enabled: true
    storageClassName: ""
    accessMode: ReadWriteOnce
    size: 1Gi
  resources:
    requests:
      memory: 512Mi
      cpu: 250m
    limits:
      memory: 1Gi
      cpu: 1000m
