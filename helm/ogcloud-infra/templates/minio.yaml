{{- if .Values.minio.enabled }}
{{- if .Values.minio.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-data
  namespace: {{ include "ogcloud-infra.namespace" . }}
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/part-of: ogcloud
spec:
  accessModes:
    - {{ .Values.minio.persistence.accessMode }}
  {{- if .Values.minio.persistence.storageClassName }}
  storageClassName: {{ .Values.minio.persistence.storageClassName }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.minio.persistence.size }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: {{ include "ogcloud-infra.namespace" . }}
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/part-of: ogcloud
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: minio
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: minio
        app.kubernetes.io/part-of: ogcloud
    spec:
      containers:
        - name: minio
          image: "{{ .Values.minio.image.repository }}:{{ .Values.minio.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          args:
            - server
            - /data
            - --console-address
            - ":{{ .Values.minio.service.consolePort }}"
          ports:
            - name: api
              containerPort: {{ .Values.minio.service.apiPort }}
            - name: console
              containerPort: {{ .Values.minio.service.consolePort }}
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-auth
                  key: access-key
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-auth
                  key: secret-key
          {{- if .Values.minio.persistence.enabled }}
          volumeMounts:
            - name: minio-data
              mountPath: /data
          {{- end }}
          resources:
{{ toYaml .Values.minio.resources | indent 12 }}
      {{- if .Values.minio.persistence.enabled }}
      volumes:
        - name: minio-data
          persistentVolumeClaim:
            claimName: minio-data
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: {{ include "ogcloud-infra.namespace" . }}
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/part-of: ogcloud
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: minio
  ports:
    - name: api
      port: {{ .Values.minio.service.apiPort }}
      targetPort: api
    - name: console
      port: {{ .Values.minio.service.consolePort }}
      targetPort: console
{{- if gt (len .Values.minio.bootstrapBuckets) 0 }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-bootstrap
  namespace: {{ include "ogcloud-infra.namespace" . }}
  labels:
    app.kubernetes.io/name: minio-bootstrap
    app.kubernetes.io/part-of: ogcloud
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: minio-bootstrap
        app.kubernetes.io/part-of: ogcloud
    spec:
      restartPolicy: OnFailure
      containers:
        - name: minio-client
          image: "{{ .Values.minio.bootstrapImage.repository }}:{{ .Values.minio.bootstrapImage.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-auth
                  key: access-key
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-auth
                  key: secret-key
          command:
            - /bin/sh
            - -c
            - |
              until mc alias set ogcloud http://minio.{{ include "ogcloud-infra.namespace" . }}.svc.cluster.local:{{ .Values.minio.service.apiPort }} "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"; do
                sleep 3
              done
              {{- range .Values.minio.bootstrapBuckets }}
              mc mb --ignore-existing "ogcloud/{{ . }}"
              {{- end }}
{{- end }}
{{- end }}
