namespace:
  name: ogcloud

global:
  imagePullPolicy: IfNotPresent

dashboard:
  replicaCount: 1
  image:
    repository: ogwarsdev/dashboard
    tag: 0.1.0
  service:
    type: ClusterIP
    port: 80
  ingress:
    enabled: false
    className: ""
    domain: dashboard.ogcloud.local
    path: /
    pathType: Prefix
    maxBodySize: 20g
    annotations: {}
    tls:
      enabled: false
      secretName: ""
  runtime:
    apiBaseUrl: http://api.ogcloud.svc.cluster.local:8080
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 250m
