{{- if .Values.loadbalancer.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loadbalancer
  namespace: {{ include "ogcloud-platform.namespace" . }}
  labels:
    app.kubernetes.io/name: loadbalancer
    app.kubernetes.io/part-of: ogcloud
spec:
  replicas: {{ .Values.loadbalancer.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: loadbalancer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: loadbalancer
        app.kubernetes.io/part-of: ogcloud
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/loadbalancer-configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/loadbalancer-secret.yaml") . | sha256sum }}
    spec:
      containers:
        - name: loadbalancer
          image: "{{ .Values.loadbalancer.image.repository }}:{{ .Values.loadbalancer.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: minecraft
              containerPort: {{ .Values.loadbalancer.service.port }}
          envFrom:
            - configMapRef:
                name: loadbalancer-config
            - secretRef:
                name: loadbalancer-secret
          resources:
{{ toYaml .Values.loadbalancer.resources | indent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: loadbalancer
  namespace: {{ include "ogcloud-platform.namespace" . }}
  labels:
    app.kubernetes.io/name: loadbalancer
    app.kubernetes.io/part-of: ogcloud
  {{- if or .Values.loadbalancer.service.domain .Values.loadbalancer.service.annotations }}
  annotations:
  {{- if .Values.loadbalancer.service.domain }}
    external-dns.alpha.kubernetes.io/hostname: {{ .Values.loadbalancer.service.domain | quote }}
  {{- end }}
  {{- with .Values.loadbalancer.service.annotations }}
{{ toYaml . | indent 4 }}
  {{- end }}
  {{- end }}
spec:
  type: {{ .Values.loadbalancer.service.type }}
  selector:
    app.kubernetes.io/name: loadbalancer
  ports:
    - name: minecraft
      port: {{ .Values.loadbalancer.service.port }}
      targetPort: minecraft
{{- end }}
