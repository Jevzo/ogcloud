{{- if .Values.networkPolicy.backendIngress.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: backend-ingress
  namespace: {{ include "ogcloud-platform.namespace" . }}
  labels:
    app.kubernetes.io/name: backend-ingress
    app.kubernetes.io/part-of: ogcloud
spec:
  podSelector:
    matchLabels:
      ogcloud/component: server
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              ogcloud/component: proxy
      ports:
        - protocol: TCP
          port: 25565
{{- end }}
