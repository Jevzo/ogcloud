spring:
  application:
    name: ogcloud-controller
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/ogcloud}
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9094}
    consumer:
      group-id: ogcloud-controller
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        max.block.ms: ${KAFKA_PRODUCER_MAX_BLOCK_MS:5000}

ogcloud:
  auth:
    service-account:
      email: ${OGCLOUD_API_EMAIL}
      password: ${OGCLOUD_API_PASSWORD}
  permission-reenable-sync:
    target-players-per-second: ${OGCLOUD_PERMISSION_REENABLE_SYNC_TARGET_PLAYERS_PER_SECOND:1000}
    min-batch-size: ${OGCLOUD_PERMISSION_REENABLE_SYNC_MIN_BATCH_SIZE:100}
    max-batch-size: ${OGCLOUD_PERMISSION_REENABLE_SYNC_MAX_BATCH_SIZE:2000}
    lock-ttl: ${OGCLOUD_PERMISSION_REENABLE_SYNC_LOCK_TTL:PT5M}
  kafka:
    consumer:
      busy:
        concurrency: ${OGCLOUD_KAFKA_BUSY_CONCURRENCY:6}
        max-poll-records: ${OGCLOUD_KAFKA_BUSY_MAX_POLL_RECORDS:500}
      light:
        concurrency: ${OGCLOUD_KAFKA_LIGHT_CONCURRENCY:3}
        max-poll-records: ${OGCLOUD_KAFKA_LIGHT_MAX_POLL_RECORDS:250}
      single:
        concurrency: ${OGCLOUD_KAFKA_SINGLE_CONCURRENCY:1}
        max-poll-records: ${OGCLOUD_KAFKA_SINGLE_MAX_POLL_RECORDS:100}
      max-poll-interval-ms: ${OGCLOUD_KAFKA_MAX_POLL_INTERVAL_MS:300000}
      session-timeout-ms: ${OGCLOUD_KAFKA_SESSION_TIMEOUT_MS:15000}
      heartbeat-interval-ms: ${OGCLOUD_KAFKA_HEARTBEAT_INTERVAL_MS:5000}
      poll-timeout-ms: ${OGCLOUD_KAFKA_LISTENER_POLL_TIMEOUT_MS:1500}
      retry:
        max-retries: ${OGCLOUD_KAFKA_RETRY_MAX_RETRIES:3}
        backoff-ms: ${OGCLOUD_KAFKA_RETRY_BACKOFF_MS:1000}
  kubernetes:
    namespace: ${OGCLOUD_NAMESPACE:ogcloud}
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin123}
  runtime:
    bucket: ${OGCLOUD_RUNTIME_BUCKET:ogcloud-runtime}
    fill-base-url: ${OGCLOUD_RUNTIME_FILL_BASE_URL:https://fill.papermc.io/v3}
    user-agent: ${OGCLOUD_RUNTIME_USER_AGENT:ogcloud-controller/1.0 (https://github.com/Jevzo/ogcloud)}
    paper-project: ${OGCLOUD_RUNTIME_PAPER_PROJECT:paper}
    modern-paper-version: ${OGCLOUD_RUNTIME_MODERN_PAPER_VERSION:1.21.11}
    legacy-paper-version: ${OGCLOUD_RUNTIME_LEGACY_PAPER_VERSION:1.8.8}
    legacy-paper-build: ${OGCLOUD_RUNTIME_LEGACY_PAPER_BUILD:445}
    velocity-project: ${OGCLOUD_RUNTIME_VELOCITY_PROJECT:velocity}
    paper-plugin-url: ${OGCLOUD_RUNTIME_PAPER_PLUGIN_URL:https://github.com/Jevzo/ogcloud/releases/download/v1.2.3-pre/ogcloud-paper-plugin-1.2.3.jar}
    velocity-plugin-url: ${OGCLOUD_RUNTIME_VELOCITY_PLUGIN_URL:https://github.com/Jevzo/ogcloud/releases/download/v1.2.3-pre/ogcloud-velocity-plugin-1.2.3.jar}
    via-version-url: ${OGCLOUD_RUNTIME_VIA_VERSION_URL:https://hangarcdn.papermc.io/plugins/ViaVersion/ViaVersion/versions/5.7.2/PAPER/ViaVersion-5.7.2.jar}
    via-backwards-url: ${OGCLOUD_RUNTIME_VIA_BACKWARDS_URL:https://hangarcdn.papermc.io/plugins/ViaVersion/ViaBackwards/versions/5.7.2/PAPER/ViaBackwards-5.7.2.jar}
    via-rewind-url: ${OGCLOUD_RUNTIME_VIA_REWIND_URL:https://hangarcdn.papermc.io/plugins/ViaVersion/ViaRewind/versions/4.0.15/PAPER/ViaRewind-4.0.15.jar}
    bungee-guard-url: ${OGCLOUD_RUNTIME_BUNGEE_GUARD_URL:https://ci.lucko.me/job/BungeeGuard/lastStableBuild/artifact/bungeeguard-universal/target/BungeeGuard.jar}
    protocol-lib-url: ${OGCLOUD_RUNTIME_PROTOCOL_LIB_URL:https://github.com/dmulloy2/ProtocolLib/releases/download/5.4.0/ProtocolLib.jar}
  pod:
    minio-endpoint: ${POD_MINIO_ENDPOINT:minio.ogcloud.svc.cluster.local:9000}
    minio-access-key: ${POD_MINIO_ACCESS_KEY:minioadmin}
    minio-secret-key: ${POD_MINIO_SECRET_KEY:minioadmin123}
    forwarding-secret: ${POD_FORWARDING_SECRET:}
    kafka-brokers: ${POD_KAFKA_BROKERS:kafka.ogcloud.svc.cluster.local:9092}
    kafka-consumer-restart-initial-backoff-ms: ${POD_OGCLOUD_KAFKA_CONSUMER_RESTART_INITIAL_BACKOFF_MS:1000}
    kafka-consumer-restart-max-backoff-ms: ${POD_OGCLOUD_KAFKA_CONSUMER_RESTART_MAX_BACKOFF_MS:30000}
    kafka-consumer-restart-jitter-ms: ${POD_OGCLOUD_KAFKA_CONSUMER_RESTART_JITTER_MS:500}
    redis-host: ${POD_REDIS_HOST:redis.ogcloud.svc.cluster.local}
    redis-port: ${POD_REDIS_PORT:6379}
    mongodb-uri: ${POD_MONGODB_URI:mongodb://mongodb.ogcloud.svc.cluster.local:27017/ogcloud}
    api-url: ${POD_API_URL:http://api.ogcloud.svc.cluster.local:8080}
    api-email: ${POD_OGCLOUD_API_EMAIL:${OGCLOUD_API_EMAIL}}
    api-password: ${POD_OGCLOUD_API_PASSWORD:${OGCLOUD_API_PASSWORD}}

server:
  port: 8081
